 <script>
  // ==========================================
  // الجزء الأول: التحليل العادي والرسوم البيانية
  // ==========================================
  let appState = { symbol: "", market: "crypto", livePrice: 0, candles: [] };
  let chart = null;
  let candlestickSeries = null; // المتغير المسؤول عن رسم الشموع

  // دالة لتحديث حالة التحميل في الواجهة
  function updateStatus(id, text, state = "loading") {
    const el = document.getElementById(id);
    if(state === "loading") el.innerHTML = `<span class="animate-spin inline-block">⏳</span> ${text}`;
    if(state === "done") el.innerHTML = `<span class="text-emerald-500">✅</span> ${text}`;
  }

  // دالة رسم المخطط البياني (تم إصلاح خطأ setData هنا)
  function renderChart(data) {
    const container = document.getElementById('chartContainer');
    const placeholder = document.getElementById('chartPlaceholder');
    if(placeholder) placeholder.style.display = 'none';

    // إنشاء المخطط إذا لم يكن موجوداً
    if (!chart) {
      chart = LightweightCharts.createChart(container, {
        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1' },
        grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      });
    }
    
    // التأكد من إنشاء سلسلة الشموع قبل تعيين البيانات لتجنب خطأ Null
    if (!candlestickSeries) {
      candlestickSeries = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#f43f5e', borderVisible: false });
    }
    
    // تنسيق الوقت والبيانات للمخطط
    const formattedData = data.map((c, i) => ({
      time: Math.floor(Date.now() / 1000) - ((data.length - i) * 3600), 
      open: c.open, high: c.high, low: c.low, close: c.close
    }));
    
    candlestickSeries.setData(formattedData);
    chart.timeScale().fitContent();
  }

  // جلب السعر المباشر
  async function fetchLivePrice() {
    updateStatus("statusPrice", "Fetching...", "loading");
    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${appState.symbol}`);
    const data = await res.json();
    appState.livePrice = parseFloat(data.price).toFixed(2);
    updateStatus("statusPrice", `Price: $${appState.livePrice}`, "done");
  }

  // جلب بيانات الشموع
  async function fetchCandlesAPI() {
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${appState.symbol}&interval=1h&limit=50`);
    const data = await res.json();
    appState.candles = data.map(c => ({ open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]) }));
    renderChart(appState.candles);
  }

  // تحليل الذكاء الاصطناعي (SMC)
  async function analyzeWithAI() {
    try {
        const prompt = `Analyze ${appState.symbol} at ${appState.livePrice}. Return ONLY strict JSON: {"bias": {"status": "bullish or bearish", "reason": "text"}, "trade_plan": {"entry": "price", "tp": "price", "sl": "price"}}`;
        const response = await puter.ai.chat(prompt);
        const aiText = typeof response === "string" ? response : response?.message?.content || JSON.stringify(response);
        const jsonMatch = aiText.match(/\{[\s\S]*\}/);
        
        if (!jsonMatch) throw new Error("AI did not return valid JSON. Try again.");
        const aiData = JSON.parse(jsonMatch[0]);

        document.getElementById("outputDashboard").innerHTML = `
          <div class="p-4 bg-slate-800 rounded-xl border border-slate-700">
            <h3 class="text-sm font-bold text-slate-400">Directional Bias</h3>
            <p class="text-xl font-bold ${aiData.bias.status.includes('bull') ? 'text-emerald-400' : 'text-rose-400'} uppercase">${aiData.bias.status}</p>
            <p class="text-sm mt-1">${aiData.bias.reason}</p>
          </div>
          <div class="mt-4 p-4 bg-slate-800 rounded-xl border border-slate-700">
            <h3 class="text-sm font-bold text-slate-400">Trade Plan</h3>
            <p>Entry: ${aiData.trade_plan.entry}</p>
            <p>TP: ${aiData.trade_plan.tp}</p>
            <p>SL: ${aiData.trade_plan.sl}</p>
          </div>`;
    } catch (err) {
        document.getElementById("outputDashboard").innerHTML = `<div class="text-rose-500 p-4 bg-rose-900/20 rounded-xl">AI Analysis Error: ${err.message}</div>`;
    }
  }

  // تشغيل كل شيء بضغطة زر واحدة
  async function runFullProcess() {
    appState.symbol = document.getElementById("symbolInput").value.toUpperCase();
    if (!appState.symbol) return alert("Please enter a symbol");
    
    const btnText = document.getElementById("autoRunText");
    const loader = document.getElementById("autoRunLoader");
    btnText.innerText = "Processing...";
    loader.classList.remove("hidden");
    
    try {
      await fetchLivePrice();
      await fetchCandlesAPI();
      await analyzeWithAI();
    } catch (error) {
      document.getElementById("outputDashboard").innerHTML = `<div class="text-rose-500">System Error: ${error.message}</div>`;
    } finally {
      btnText.innerText = "Auto Analyze Data";
      loader.classList.add("hidden");
    }
  }


  // ==========================================
  // الجزء الثاني: التعلم الآلي (TensorFlow.js)
  // ==========================================
  let mlModel = null;

  // جلب البيانات لتدريب النموذج
  async function fetchMLData(symbol, limit) {
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=${limit}`);
    const data = await res.json();
    return data.map(candle => parseFloat(candle[4]));
  }

  // تطبيع البيانات لتسهيل قراءتها على الذكاء الاصطناعي
  function normalizeData(data) {
    const min = Math.min(...data);
    const max = Math.max(...data);
    return data.map(val => (val - min) / (max - min));
  }

  // إصلاح خطأ TensorFlow 3D: تحويل البيانات لتكون مصفوفة ثلاثية الأبعاد
  function createMLSequences(data, seqLength = 20) {
    const X = [], y = [];
    for (let i = seqLength; i < data.length; i++) {
      // التعديل هنا: نقوم بتغليف كل قيمة [val] لتصبح المصفوفة متوافقة مع tensor3d
      const seq = data.slice(i - seqLength, i).map(val => [val]); 
      X.push(seq);
      y.push(data[i] > data[i-1] ? 1 : 0);
    }
    return { X, y, seqLength };
  }

  // بناء نموذج الذكاء الاصطناعي
  function buildMLModel(seqLength) {
    const m = tf.sequential();
    m.add(tf.layers.lstm({ units: 30, inputShape: [seqLength, 1], returnSequences: false }));
    m.add(tf.layers.dense({ units: 1, activation: 'sigmoid' }));
    m.compile({ optimizer: 'adam', loss: 'binaryCrossentropy', metrics: ['accuracy'] });
    return m;
  }

  // التدريب والتوقع
  async function trainAndPredict() {
    const symbol = document.getElementById('symbolInput').value.toUpperCase();
    const candlesCount = parseInt(document.getElementById('mlCandlesCount').value);
    const epochs = parseInt(document.getElementById('mlEpochs').value);
    const seqLength = 20;

    const statusDiv = document.getElementById('mlStatus');
    const resultDiv = document.getElementById('mlResult');
    const trainBtn = document.getElementById('trainModelBtn');

    trainBtn.disabled = true;
    statusDiv.classList.remove('hidden');
    resultDiv.classList.add('hidden');
    
    try {
      statusDiv.innerText = '1/4 Fetching data from Binance...';
      const closes = await fetchMLData(symbol, candlesCount);
      
      statusDiv.innerText = '2/4 Preparing tensors...';
      const normalized = normalizeData(closes);
      const { X, y } = createMLSequences(normalized, seqLength);

      const split = Math.floor(X.length * 0.8);
      // الآن المصفوفة X جاهزة تماماً وتعمل بدون أخطاء
      const trainX = tf.tensor3d(X.slice(0, split), [split, seqLength, 1]);
      const trainY = tf.tensor2d(y.slice(0, split), [split, 1]);

      statusDiv.innerText = `3/4 Training ML Model (${epochs} epochs)...`;
      mlModel = buildMLModel(seqLength);

      await mlModel.fit(trainX, trainY, {
        epochs: epochs,
        callbacks: {
          onEpochEnd: (epoch, logs) => {
            statusDiv.innerText = `Training... Epoch ${epoch+1}/${epochs} (Accuracy: ${(logs.acc*100).toFixed(1)}%)`;
          }
        }
      });

      statusDiv.innerText = '4/4 Predicting next candle...';
      // تجهيز بيانات آخر شمعة للتوقع بطريقة صحيحة ثلاثية الأبعاد
      const lastSeq = normalized.slice(-seqLength).map(val => [val]);
      const inputPred = tf.tensor3d([lastSeq], [1, seqLength, 1]);
      const prob = (await mlModel.predict(inputPred).data())[0];
      
      const direction = prob > 0.5 ? 'BULLISH (صاعد)' : 'BEARISH (هابط)';
      const confidence = (prob > 0.5 ? prob : 1 - prob) * 100;

      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `
        <div class="text-slate-400 text-xs">AI ML Prediction:</div>
        <div class="font-bold text-lg ${direction.includes('BULLISH') ? 'text-emerald-400' : 'text-rose-400'}">${direction}</div>
        <div class="text-xs">Confidence Rate: ${confidence.toFixed(1)}%</div>
      `;
      statusDiv.innerText = 'Training Complete ✅';

    } catch (err) {
      statusDiv.innerText = `Error: ${err.message}`;
    } finally {
      trainBtn.disabled = false;
    }
  }

  document.getElementById('trainModelBtn').addEventListener('click', trainAndPredict);
</script>
